<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EAS Dashboard Hub</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        height: 100vh;

        /* BACKGROUND IMAGE */
        background-image: url('https://petronas.sharepoint.com/teams/performanceresourcecontrol/Shared Documents/5. Analytic/EAS Dashboard/PSP Performance/Asset/EAS Dashboard Hub Background.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    /* DARK OVERLAY (for readability) */
    .overlay {
        background: rgba(0,0,0,0.45);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    /* MAIN CONTENT */
    .content {
        position: relative;
        z-index: 2;
        color: white;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 50px;
        letter-spacing: 1px;
    }

    /* BUTTON CONTAINER */
    .container {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* DASHBOARD BUTTON */
    .btn {
        background: rgba(255,255,255,0.85);
        color: #004F52;
        padding: 18px 50px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 40px;
        text-decoration: none;
        min-width: 140px;
        transition: all 0.3s ease;
    }

    .btn:hover {
        background: #00A19C;
        color: white;
        transform: translateY(-3px);
    }

    /* WATERMARK */
    .watermark {
        position: absolute;
        bottom: 15px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.7);
        font-size: 12px;
        letter-spacing: 0.5px;
        z-index: 2;
    }
</style>
</head>

<body>

    <div class="overlay"></div>

    <div class="content">
        <h1>
    Engineering &amp; Asset Solutions<br>
    <span class="subtitle">Dashboard Hub</span> </h1>

        <div class="container">

            <a class="btn"
               href="https://app.powerbi.com/links/VpKUMvfopG?ctid=3b2e8941-7948-4131-978a-b2dfc7295091&pbi_source=linkShare"
               target="_blank">
               TSS
            </a>

            <a class="btn"
               href="https://app.powerbi.com/links/mQx58UARGz?ctid=3b2e8941-7948-4131-978a-b2dfc7295091&pbi_source=linkShare&bookmarkGuid=13a9b42f-0af7-49d9-97e2-a177036fe3a8"
               target="_blank">
               PSP
            </a>

            <a class="btn"
               href="https://app.powerbi.com/groups/zzzzz/reports/zzzzz"
               target="_blank">
               MVC
            </a>

        </div>
    </div>

    <div class="watermark">
        © Powered by Performance & Resource Control team
    </div>

</body>
</html>
